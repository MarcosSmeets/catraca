services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: catraca
      POSTGRES_PASSWORD: catraca
      POSTGRES_DB: catraca
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catraca"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --notify-keyspace-events Ex
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    image: migrate/migrate
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/migrations:/migrations
    command:
      [
        "-path=/migrations",
        "-database=postgres://catraca:catraca@postgres:5432/catraca?sslmode=disable",
        "up"
      ]
    restart: on-failure

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://catraca:catraca@postgres:5432/catraca?sslmode=disable
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-refresh-me-in-production}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      APP_ENV: ${APP_ENV:-development}
      PORT: 8080
      APP_SEED: ${APP_SEED:-false}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      CPF_PEPPER: ${CPF_PEPPER:-catraca-dev-cpf-pepper-local}
      PHONE_ENCRYPTION_KEY: ${PHONE_ENCRYPTION_KEY:-catraca-dev-phone-key-local}
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  pgdata:
